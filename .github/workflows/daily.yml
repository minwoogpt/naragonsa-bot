name: daily-bid-check
on:
  schedule:
    - cron: '00 09 * * *' # 한국시간 저녁 6시
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3에서 v4로 업데이트
      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.10' # 파이썬 버전도 조금 더 최신으로
      - name: Install dependencies
        run: pip install requests
      - name: Run bot
        env:
          DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
